version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ReelsAssetVault — local development / production compose
#
# Quick start:
#   cp backend/.env.example backend/.env   # fill in SECRET_KEY
#   docker compose up --build
#
# Services:
#   postgres  → localhost:5432
#   backend   → http://localhost:8000  (API + /docs)
#   frontend  → http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: reelsvault_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: reelsvaultdb
      POSTGRES_USER: reelsvault
      POSTGRES_PASSWORD: reelsvault_secret   # change in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelsvault -d reelsvaultdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reelsvault_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://reelsvault:reelsvault_secret@postgres:5432/reelsvaultdb
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-secret-key}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      # Persist uploaded video files and thumbnails across container restarts
      - storage_data:/app/storage
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the JS bundle at build time — must be reachable from the browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: reelsvault_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: reelsvault_postgres_data
  storage_data:
    name: reelsvault_storage_data
